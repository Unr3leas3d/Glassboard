<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=460, initial-scale=1.0" />
<title>Glasboard — Management Panel Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ─── Reset ─── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Shared tokens ─── */
  :root {
    --gold:        #C1B97E;
    --gold-warm:   #D4C97A;
    --gold-dim:    #9E9764;
    --gold-glow:   rgba(193, 185, 126, 0.12);
    --gold-glow-strong: rgba(193, 185, 126, 0.25);

    --radius:      12px;
    --radius-sm:   8px;
    --radius-pill: 100px;

    --font-display: 'Inter', -apple-system, sans-serif;
    --font-body:    'Inter', -apple-system, sans-serif;

    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ─── Dark theme (default) ─── */
  [data-theme="dark"] {
    --bg-deep:     #0C0C0E;
    --bg-surface:  #141416;
    --bg-card:     #1A1A1E;
    --bg-elevated: #222226;
    --bg-input:    #18181C;

    --border:      rgba(255, 255, 255, 0.07);
    --border-gold: rgba(193, 185, 126, 0.18);
    --border-hover: rgba(255, 255, 255, 0.14);

    --text:        #F0EDE6;
    --text-dim:    rgba(240, 237, 230, 0.50);
    --text-muted:  rgba(240, 237, 230, 0.35);

    --card-shadow: none;
    --card-glow-hover: 0 0 30px rgba(193, 185, 126, 0.06), 0 8px 32px rgba(0, 0, 0, 0.3);
    --window-bg: linear-gradient(180deg, #0E0E10 0%, #0C0C0E 100%);
    --grain-opacity: 0.03;
    --outer-bg: #050506;
    --window-border: rgba(255,255,255,0.05);
  }

  /* ─── Light theme ─── */
  [data-theme="light"] {
    --bg-deep:     #F6F4EF;
    --bg-surface:  #EFECE5;
    --bg-card:     #FFFFFF;
    --bg-elevated: #F0EDE6;
    --bg-input:    #F0EDE6;

    --border:      rgba(0, 0, 0, 0.08);
    --border-gold: rgba(193, 185, 126, 0.30);
    --border-hover: rgba(0, 0, 0, 0.15);

    --text:        #1A1A1E;
    --text-dim:    rgba(26, 26, 30, 0.60);
    --text-muted:  rgba(26, 26, 30, 0.40);

    --card-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
    --card-glow-hover: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.08);
    --window-bg: linear-gradient(180deg, #F8F6F1 0%, #F6F4EF 100%);
    --grain-opacity: 0.015;
    --outer-bg: #E8E5DE;
    --window-border: rgba(0,0,0,0.08);
  }

  /* ─── Grain texture via SVG data URI ─── */
  @keyframes grain-drift {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-2%, 3%); }
    50% { transform: translate(1%, -2%); }
    75% { transform: translate(3%, 1%); }
  }

  /* ─── Page ─── */
  html, body {
    width: 460px;
    height: 640px;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.4s var(--ease-out), color 0.3s var(--ease-out);
  }

  /* ─── Viewport container — simulates 460×640 Tauri window ─── */
  .window {
    position: relative;
    width: 460px;
    height: 640px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(193, 185, 126, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(140, 120, 80, 0.03) 0%, transparent 50%),
      var(--window-bg);
    transition: background 0.4s var(--ease-out);
  }

  /* Grain overlay */
  .window::before {
    content: '';
    position: absolute;
    inset: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: grain-drift 8s steps(4) infinite;
    opacity: var(--grain-opacity, 1);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle top decorative line */
  .window::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0.4;
    z-index: 2;
  }

  /* ─── Titlebar drag region ─── */
  .titlebar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 40px;
    z-index: 10;
    -webkit-app-region: drag;
    background: transparent;
  }

  /* ─── Main content ─── */
  .content {
    position: relative;
    z-index: 1;
    padding: 56px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    height: 100%;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
    transition: color 0.3s var(--ease-out);
  }

  .brand-name span {
    color: var(--gold);
  }

  .brand-tagline {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.3s var(--ease-out);
  }

  /* ─── Avatar ─── */
  .avatar-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: var(--bg-elevated);
    overflow: hidden;
    transition: all 0.3s var(--ease-out);
    flex-shrink: 0;
  }

  .avatar-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: conic-gradient(
      from 45deg,
      transparent 0%,
      var(--gold-glow) 25%,
      transparent 50%,
      var(--gold-glow) 75%,
      transparent 100%
    );
    z-index: -1;
    opacity: 0;
    transition: opacity 0.4s var(--ease-out);
  }

  .avatar-btn:hover::before {
    opacity: 1;
  }

  .avatar-btn:hover {
    box-shadow: 0 0 20px var(--gold-glow);
  }

  .avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .avatar-initials {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    transition: border-color 0.3s var(--ease-out), color 0.3s var(--ease-out);
  }

  .avatar-btn:hover .avatar-initials {
    border-color: var(--border-gold);
    color: var(--gold);
  }

  /* ─── Org pill ─── */
  .org-section {
    margin-bottom: 20px;
  }

  .org-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px 5px 10px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    cursor: pointer;
    transition: all 0.25s var(--ease-out);
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    font-family: var(--font-body);
  }

  .org-pill:hover {
    border-color: var(--border-hover);
    background: var(--bg-card);
    color: var(--text);
  }

  .org-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    flex-shrink: 0;
  }

  .org-chevron {
    width: 12px;
    height: 12px;
    opacity: 0.4;
    margin-left: 2px;
    transition: opacity 0.2s;
  }

  .org-pill:hover .org-chevron {
    opacity: 0.7;
  }

  /* ─── Session Card ─── */
  .session-card {
    position: relative;
    border-radius: var(--radius);
    padding: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
    overflow: hidden;
    transition: all 0.4s var(--ease-out);
    box-shadow: var(--card-shadow);
  }

  /* Gold inner glow */
  .session-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background:
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(193, 185, 126, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Subtle border glow on hover */
  .session-card:hover {
    border-color: rgba(193, 185, 126, 0.28);
    box-shadow: var(--card-glow-hover);
  }

  .session-card-inner {
    position: relative;
    z-index: 1;
  }

  .session-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 16px;
  }

  /* ─── Start session row ─── */
  .start-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .session-input {
    flex: 1;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-input);
    padding: 0 14px;
    font-size: 13px;
    font-family: var(--font-body);
    color: var(--text);
    outline: none;
    transition: all 0.25s var(--ease-out);
  }

  .session-input::placeholder {
    color: var(--text-muted);
  }

  .session-input:focus {
    border-color: var(--border-gold);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }

  .btn-start {
    height: 40px;
    padding: 0 22px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-warm) 100%);
    color: #1A1A1E;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s var(--ease-out);
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.15) 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-start:hover {
    box-shadow: 0 4px 20px rgba(193, 185, 126, 0.30), 0 0 0 1px rgba(193, 185, 126, 0.15);
    transform: translateY(-1px);
  }

  .btn-start:hover::before {
    opacity: 1;
  }

  .btn-start:active {
    transform: translateY(0);
  }

  /* ─── Divider ─── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ─── Join row ─── */
  .join-row {
    display: flex;
    gap: 10px;
  }

  .join-input {
    flex: 1;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-input);
    padding: 0 14px;
    font-size: 15px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text);
    letter-spacing: 0.25em;
    text-align: center;
    outline: none;
    transition: all 0.25s var(--ease-out);
    text-transform: uppercase;
  }

  .join-input::placeholder {
    color: var(--text-muted);
    letter-spacing: 0.2em;
    font-size: 13px;
    font-family: var(--font-body);
  }

  .join-input:focus {
    border-color: var(--border-hover);
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
  }

  [data-theme="light"] .join-input:focus {
    box-shadow: 0 0 0 3px var(--gold-glow);
  }

  .btn-join {
    height: 40px;
    padding: 0 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s var(--ease-out);
    white-space: nowrap;
  }

  .btn-join:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: var(--bg-elevated);
  }

  /* ─── Footer ─── */
  .footer {
    margin-top: auto;
    padding-top: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* ─── Decorative bottom line ─── */
  .bottom-accent {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(193, 185, 126, 0.2), transparent);
    margin: 0 auto;
  }

  /* ─── Theme toggle button ─── */
  .theme-toggle {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 20;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s var(--ease-out);
    color: var(--text-dim);
    -webkit-app-region: no-drag;
  }

  .theme-toggle:hover {
    border-color: var(--border-gold);
    color: var(--gold);
    background: var(--bg-card);
  }

  .theme-toggle svg {
    width: 16px;
    height: 16px;
  }

  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  [data-theme="light"] .theme-toggle .icon-sun { display: block; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }

  /* ─── Entrance animations ─── */
  @keyframes fade-up {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .header        { animation: fade-up 0.6s var(--ease-out) 0.1s both; }
  .org-section   { animation: fade-up 0.6s var(--ease-out) 0.2s both; }
  .session-card  { animation: fade-up 0.6s var(--ease-out) 0.3s both; }
  .footer        { animation: fade-in 0.8s var(--ease-out) 0.6s both; }

  /* ─── Responsive — browser preview centering ─── */
  @media (min-width: 461px) {
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background: var(--outer-bg);
    }
    .window {
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--window-border);
    }
  }
</style>
</head>
<body>

<div class="window">
  <!-- Theme toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/>
    </svg>
  </button>

  <!-- Titlebar (drag region in Tauri) -->
  <div class="titlebar"></div>

  <div class="content">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="brand-name">Glass<span>board</span></div>
        <div class="brand-tagline">Collaborative Overlay</div>
      </div>
      <button class="avatar-btn" title="Ayub Mohamed">
        <div class="avatar-initials">AM</div>
      </button>
    </div>

    <!-- Org selector pill -->
    <div class="org-section">
      <button class="org-pill">
        <span class="org-dot"></span>
        Acme Design Co
        <svg class="org-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>
    </div>

    <!-- Session card -->
    <div class="session-card">
      <div class="session-card-inner">
        <div class="session-label">Session</div>

        <!-- Start -->
        <div class="start-row">
          <input type="text" class="session-input" placeholder="Session title (optional)" />
          <button class="btn-start">Start</button>
        </div>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or join</span>
          <div class="divider-line"></div>
        </div>

        <!-- Join -->
        <div class="join-row">
          <input type="text" class="join-input" placeholder="ABC123" maxlength="6" />
          <button class="btn-join">Join</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="bottom-accent"></div>
    </div>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}
</script>

</body>
</html>
